<header class="app-header">
  <a class="brand" routerLink="/anmeldung" aria-label="Fehmarn Open Startseite">
    <app-brand-icon class="brand-mark" />
    <span class="brand-text">
      <strong>Fehmarn Open</strong>
      <small>Darts Turnier</small>
    </span>
  </a>

  <nav class="desktop-nav" aria-label="Hauptnavigation">
    <a routerLink="/anmeldung" routerLinkActive="active">Anmeldung</a>
    <a routerLink="/teilnehmer" routerLinkActive="active">Teilnehmer</a>
    <a routerLink="/flyer" routerLinkActive="active">Flyer</a>

    @if (authService.isLoggedIn()) {
      <button type="button" class="nav-action" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/admin/login" routerLinkActive="active">Login</a>
    }
  </nav>
</header>

<main class="app-main">
  <router-outlet />
  <app-toast />

  <footer class="app-footer">
    <nav aria-label="Rechtliches">
      <a routerLink="/impressum" routerLinkActive="active">Impressum</a>
      <a routerLink="/datenschutz" routerLinkActive="active">Datenschutz</a>
    </nav>
    <small>© 2026 Fehmarn Open</small>
  </footer>
</main>

<nav class="mobile-tabs" aria-label="Mobile Hauptnavigation">
  <a routerLink="/anmeldung" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">A</span>
    <span>Anmeldung</span>
  </a>
  <a routerLink="/teilnehmer" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">T</span>
    <span>Teilnehmer</span>
  </a>
  <a routerLink="/flyer" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">F</span>
    <span>Flyer</span>
  </a>

  @if (authService.isLoggedIn()) {
    <button type="button" (click)="logout()">
      <span class="tab-icon" aria-hidden="true">L</span>
      <span>Logout</span>
    </button>
  } @else {
    <a routerLink="/admin/login" routerLinkActive="active">
      <span class="tab-icon" aria-hidden="true">L</span>
      <span>Login</span>
    </a>
  }
</nav>
