name: Deploy

# Push auf main  -> automatisches Deployment der TEST-Umgebung (Port 8081)
# Manueller Start -> Auswahl test ODER prod (Port 8080)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Zielumgebung'
        required: true
        default: test
        type: choice
        options: [ test, prod ]

# Verhindert parallele Deployments auf dieselbe Umgebung
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'test' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Java 25 aufsetzen
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (inkl. Frontend via frontend-maven-plugin)
        working-directory: backend
        run: ./mvnw -B clean package

      - name: Zielumgebung bestimmen
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=test" >> "$GITHUB_OUTPUT"
          fi

      - name: JAR auf den Server kopieren
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: backend/target/fehmarnopen-0.0.1-SNAPSHOT.jar
          target: /tmp/
          strip_components: 2

      - name: Installieren, Service neu starten & Healthcheck
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            ENV=${{ steps.target.outputs.env }}
            if [ "$ENV" = "prod" ]; then PORT=8080; else PORT=8081; fi

            install -o fehmarnopen -g fehmarnopen \
              /tmp/fehmarnopen-0.0.1-SNAPSHOT.jar \
              /opt/fehmarnopen/$ENV/app.jar

            systemctl restart fehmarnopen-$ENV
            sleep 8

            systemctl is-active fehmarnopen-$ENV
            echo "Healthcheck auf Port $PORT ..."
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://localhost:$PORT/api/teilnehmer
            echo "Deployment ($ENV) erfolgreich."
