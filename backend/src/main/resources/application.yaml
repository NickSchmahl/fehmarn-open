spring:
  application:
    name: fehmarnopen

  datasource:
    url: jdbc:sqlite:fehmarnopen.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite erlaubt nur einen Schreiber gleichzeitig -> Pool auf 1, damit sich
      # gleichzeitige Writes (z.B. Team-Aktionen) am Pool serialisieren statt mit
      # SQLITE_BUSY zu scheitern. busy_timeout als zusaetzliches Sicherheitsnetz.
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA busy_timeout = 5000"

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: true

  jackson:
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}


fehmarnopen:
  admin:
    accounts:
      - username: ${ADMIN_1_USERNAME:admin1}
        password: ${ADMIN_1_PASSWORD}
      - username: ${ADMIN_2_USERNAME:admin2}
        password: ${ADMIN_2_PASSWORD}
  mail:
    from: ${MAIL_FROM:noreply@fehmarn-open.de}
    enabled: ${MAIL_ENABLED:true}
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
