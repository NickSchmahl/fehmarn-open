<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body style="font-family: 'Helvetica Neue', Arial, sans-serif; color: #1c2030; background: #f4f5f8; margin: 0; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px; border: 1px solid #e3e6ee;">
      <h1 style="font-size: 20px; margin: 0 0 4px;">Fehmarn Open</h1>
      <p style="color: #6b7394; margin: 0 0 24px; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;">Darts Turnier</p>

      <p>Hallo <strong th:text="${vorname} + ' ' + ${nachname}">Max Mustermann</strong>,</p>
      <p>vielen Dank für deine Anmeldung! Du bist für folgende Disziplinen registriert:</p>

      <ul style="padding-left: 18px;">
        <li th:each="pos : ${disziplinen}">
          <span th:text="${pos.disziplin.label}">Herreneinzel</span>
          <span th:if="${pos.teamName}" th:text="'– Team: ' + ${pos.teamName}" style="color: #6b7394;">– Team: …</span>
        </li>
      </ul>

      <p>Wir freuen uns auf dich. Bei Fragen einfach auf diese Mail antworten.</p>
      <p style="color: #6b7394; font-size: 12px; margin-top: 32px;">Sportliche Grüße<br />Dein Fehmarn-Open-Team</p>
    </div>
  </body>
</html>
