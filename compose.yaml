# Lokale Entwicklungsdienste. Start: `docker compose up -d`
# Mailpit faengt alle ausgehenden Mails ab (kein echter Versand):
#   SMTP:   localhost:1025  (Backend-Default)
#   Web-UI: http://localhost:8025
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: fehmarnopen-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
