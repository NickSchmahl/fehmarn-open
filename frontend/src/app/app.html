<header class="app-header">
  <a class="brand" routerLink="/flyer" aria-label="Fehmarn Open Startseite">
    <app-brand-icon class="brand-mark" />
    <span class="brand-text">
      <strong>Fehmarn Open</strong>
      <small>Darts Turnier</small>
    </span>
  </a>

  <nav class="desktop-nav" aria-label="Hauptnavigation">
    <a routerLink="/anmeldung" routerLinkActive="active">Anmeldung</a>
    <a routerLink="/teilnehmer" routerLinkActive="active">Teilnehmer</a>
    <a routerLink="/flyer" routerLinkActive="active">Flyer</a>

    @if (authService.isLoggedIn()) {
      <button type="button" class="nav-action" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/admin/login" routerLinkActive="active">Login</a>
    }
  </nav>
</header>

<main class="app-main">
  <router-outlet />
  <app-toast />

  <footer class="app-footer">
    <nav aria-label="Rechtliches">
      <a routerLink="/impressum" routerLinkActive="active">Impressum</a>
      <a routerLink="/datenschutz" routerLinkActive="active">Datenschutz</a>
    </nav>
    <small>© 2026 Fehmarn Open</small>
  </footer>
</main>

<nav class="mobile-tabs" aria-label="Mobile Hauptnavigation">
  <a routerLink="/anmeldung" routerLinkActive="active">
    <svg
      class="tab-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <rect x="5" y="3" width="14" height="18" rx="2.5" />
      <path d="M9 3v2h6V3" />
      <path d="M9 12l2 2 4-4" />
    </svg>
    <span>Anmeldung</span>
  </a>
  <a routerLink="/teilnehmer" routerLinkActive="active">
    <svg
      class="tab-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <circle cx="9" cy="8" r="3" />
      <path d="M3.5 19c.8-3 3-4.5 5.5-4.5s4.7 1.5 5.5 4.5" />
      <circle cx="17" cy="9" r="2.2" />
      <path d="M15.8 14.6c1.9.4 3.3 1.7 3.9 4" />
    </svg>
    <span>Teilnehmer</span>
  </a>
  <a routerLink="/flyer" routerLinkActive="active">
    <svg
      class="tab-icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <rect x="4" y="4" width="16" height="16" rx="2.5" />
      <circle cx="9" cy="9.5" r="1.6" fill="currentColor" stroke="none" />
      <path d="M4 16l5-4.5 3.5 3 3-3L20 15" />
    </svg>
    <span>Flyer</span>
  </a>

  @if (authService.isLoggedIn()) {
    <button type="button" (click)="logout()">
      <svg
        class="tab-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M9 21H5.5A1.5 1.5 0 0 1 4 19.5v-15A1.5 1.5 0 0 1 5.5 3H9" />
        <path d="M16 17l5-5-5-5" />
        <path d="M20 12H9" />
      </svg>
      <span>Logout</span>
    </button>
  } @else {
    <a routerLink="/admin/login" routerLinkActive="active">
      <svg
        class="tab-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M15 4h3.5A1.5 1.5 0 0 1 20 5.5v13a1.5 1.5 0 0 1-1.5 1.5H15" />
        <path d="M4 12h11.5" />
        <path d="M12 8l4 4-4 4" />
      </svg>
      <span>Login</span>
    </a>
  }
</nav>
