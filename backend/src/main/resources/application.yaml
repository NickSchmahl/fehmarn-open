spring:
  application:
    name: fehmarnopen

  datasource:
    url: jdbc:sqlite:fehmarnopen.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite erlaubt nur einen Schreiber gleichzeitig -> Pool auf 1, damit sich
      # gleichzeitige Writes (z.B. Team-Aktionen) am Pool serialisieren statt mit
      # SQLITE_BUSY zu scheitern. busy_timeout als zusaetzliches Sicherheitsnetz.
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA busy_timeout = 5000"

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      # Schema wird ausschließlich von Liquibase verwaltet (siehe ADR 0009). 'none' statt 'validate',
      # weil Hibernate für die Long-@Id BIGINT erwartet, SQLite für autoincrement aber INTEGER-PK
      # braucht (rowid-Alias) – 'validate' würde an diesem unauflösbaren Typkonflikt scheitern.
      # Sicherheitsnetz gegen Schema-Drift sind stattdessen die Persistenz-Tests (Round-Trip).
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    default-property-inclusion: non_null

fehmarnopen:
  admin:
    accounts:
      - username: ${ADMIN_1_USERNAME:admin1}
        password: ${ADMIN_1_PASSWORD}
      - username: ${ADMIN_2_USERNAME:admin2}
        password: ${ADMIN_2_PASSWORD}
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
