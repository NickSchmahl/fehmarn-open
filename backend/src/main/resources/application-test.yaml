spring:
  datasource:
    url: jdbc:sqlite:./target/test-auth.db
    driver-class-name: org.sqlite.JDBC
  mail:
    host: localhost
    port: 1025
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.community.dialect.SQLiteDialect

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: test-secret-key-which-is-long-enough-for-hmac-sha256
    expiration-ms: 3600000

fehmarnopen:
  admin:
    accounts:
      - username: testadmin
        password: testpassword
  mail:
    enabled: false