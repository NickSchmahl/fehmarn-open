# Liquibase-Master-Changelog. Bindet die einzelnen Änderungs-Changelogs in Reihenfolge ein.
# Neue Schema-Änderung = neue Datei unter changes/ + hier eingebunden (siehe ADR 0009).
databaseChangeLog:
  - include:
      file: changes/001-init.sql
      relativeToChangelogFile: true
  - include:
      file: changes/002-add-u18-disziplin.sql
      relativeToChangelogFile: true
  - include:
      file: changes/003-drop-turnier-config.sql
      relativeToChangelogFile: true
