<div
  aria-live="polite"
  aria-atomic="false"
  class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 w-80"
>
  @for (toast of toasts(); track toast.id) {
    <div
      role="alert"
      class="flex items-start justify-between gap-3 rounded-lg px-4 py-3
             bg-red-700 text-white text-sm shadow-lg
             animate-in slide-in-from-bottom-2 fade-in duration-200"
    >
      <span>{{ toast.message }}</span>
      <button
        (click)="toast.dismiss()"
        class="shrink-0 text-red-200 hover:text-white transition-colors"
        aria-label="Schließen"
      >
        ✕
      </button>
    </div>
  }
</div>
