spring:
  datasource:
    url: jdbc:sqlite:./target/test-auth.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      # Wie Produktion: Schema kommt von Liquibase, Hibernate fasst es nicht an (siehe ADR 0009).
      ddl-auto: none
    database-platform: org.hibernate.community.dialect.SQLiteDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  cors:
    allowed-origins: http://localhost:4200
  jwt:
    secret: test-secret-key-which-is-long-enough-for-hmac-sha256
    expiration-ms: 3600000

fehmarnopen:
  admin:
    accounts:
      - username: testadmin
        password: testpassword